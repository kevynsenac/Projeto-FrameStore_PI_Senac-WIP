<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrameStore | Seu Perfil</title>
    <link rel="stylesheet" href="css/perfil.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="profile-page">

    <header class="navbar">
        <div class="logo-container">
            <a href="homepage.html" class="logo-link">
                <img src="media/home/site_logo.png" alt="Logo Unico" class="logo-unico">
                <img src="media/home/site_nome.png" alt="Logo FrameStore" class="logo-nome">
            </a>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar-menu" id="sidebar">
            <div class="toggle-container">
                <button class="menu-toggle" onclick="toggleMenu()">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <ul>
                <li><a href="#"><i class="fas fa-tag"></i><span>Ofertas</span></a></li>
                <li><a href="#"><i class="fas fa-gift"></i><span>Gift Cards</span></a></li>
                <li><a href="#"><i class="fas fa-desktop"></i><span>PC</span></a></li>
                <li><a href="#"><i class="fab fa-playstation"></i><span>Playstation</span></a></li>
                <li><a href="#"><i class="fab fa-xbox"></i><span>Xbox</span></a></li>
                <li><a href="#"><i class="fas fa-mobile-alt"></i><span>Mobile</span></a></li>
            </ul>
        </aside>

        <main class="profile-content">
            <section class="profile-header">
                <div class="user-info-section">
                    <div class="profile-avatar-container">
                        <img src="media/home/site_logo.png" alt="Avatar do Usuário" class="profile-avatar">
                    </div>
                    <div class="user-text-info">
                        <h1 id="nome-usuario">Olá, Usuário</h1>
                        <p><i class="fas fa-user"></i> usuario@email.com</p>
                        <p><i class="fas fa-globe"></i> Idioma: Português (BR)</p>
                    </div>
                </div>

                <div class="connections-section">
                    <h2>Conecte suas contas:</h2>
                    <div class="connection-buttons">
                        <button class="btn-connection btn-google">
                            <i class="fab fa-google"></i>
                            Google    
                        </button>

                        <button class="btn-connection btn-steam">
                            <i class="fab fa-steam"></i>
                            Steam
                        </button>

                        <button class="btn-connection btn-discord">
                            <i class="fab fa-discord"></i>
                            Discord
                        </button>
                    </div>
                </div>
            </section>

            <section class="profile-tabs">
                <button class="tab-profile active">Meus Games</button>
                <button class="tab-profile inactive">Lista de Desejos</button>
                <button class="tab-profile inactive">Meus Pedidos</button>
                <button class="tab-profile inactive">Carteira</button>
                <button class="tab-profile inactive">Minha Conta</button>
            </section>

            <section class="games-section">
                <h2>Recentes</h2>
                <div class="games-list">
                    <div class="game-item"><img src="media/home/site_logo.png" alt="Capa Jogo"></div>
                    <div class="game-item"><img src="media/home/site_logo.png" alt="Capa Jogo"></div>
                    <div class="game-item"><img src="media/home/site_logo.png" alt="Capa Jogo"></div>
                    <div class="game-item"><img src="media/home/site_logo.png" alt="Capa Jogo"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/perfil.js"></script>
</body>
</html>
