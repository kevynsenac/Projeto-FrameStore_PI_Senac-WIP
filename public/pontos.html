<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrameStore | Loja de Pontos</title>
    <link rel="stylesheet" href="css/homepage.css">
    <link rel="stylesheet" href="css/pontos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>
    <header class="navbar">
        <div class="logo-container">
            <a href="homepage.html" class="logo-link">
                <img src="/src/templates/assets/cover/site_logo.png" alt="Logo Unico" class="logo-unico">
                <img src="/src/templates/assets/cover/site_nome.png" alt="Logo Nome" class="logo-nome">
            </a>
        </div>
        <div class="user-actions" style="color: white; font-weight: bold; font-size: 1.2rem; margin-right: 20px;">
            <i class="fas fa-star" style="color: #feca57;"></i> <span id="nav-pontos">0</span>
        </div>
    </header>

    <main class="points-container">
        <section class="points-header">
            <h1>Loja de Recompensas</h1>
            <p>Troque seus pontos acumulados em compras por cupons de desconto.</p>
            <h2 style="margin-top: 20px;">Seu Saldo: <span id="saldo-pontos" style="color: #feca57;">0</span> pontos</h2>
        </section>

        <section>
            <h2 style="margin-bottom: 20px;">Cupons Disponíveis</h2>
            <div class="coupons-grid" id="cupons-loja-container">
                <p>Carregando recompensas...</p>
            </div>
        </section>
    </main>

    <script src="js/pontos.js"></script>
</body>
</html>
