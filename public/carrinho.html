<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrameStore | Meu Carrinho</title>
    <link rel="stylesheet" href="css/homepage.css">
    <link rel="stylesheet" href="css/carrinho.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>
    <header class="navbar">
        <div class="logo-container">
            <a href="homepage.html" class="logo-link">
                <img src="/src/templates/assets/cover/site_logo.png" alt="Logo Unico" class="logo-unico">
                <img src="/src/templates/assets/cover/site_nome.png" alt="Logo Nome" class="logo-nome">
            </a>
        </div>
    </header>

    <main class="cart-container">
        <section class="cart-items">
            <h2>Meu Carrinho</h2>
            <div id="cart-list">
                <p>Carregando itens...</p>
            </div>
        </section>

        <aside class="cart-summary">
            <h2>Resumo do Pedido</h2>
            <div class="summary-row">
                <span>Subtotal:</span>
                <span id="cart-subtotal">R$ 0,00</span>
            </div>
            
            <div class="coupon-section">
                <label for="coupon-select">Aplicar Cupom:</label>
                <select id="coupon-select" onchange="calcularTotal()">
                    <option value="">Nenhum cupom selecionado</option>
                </select>
                <div class="summary-row" style="margin-top: 15px; color: #ff4757; display: none;" id="discount-row">
                    <span>Desconto:</span>
                    <span id="cart-discount">- R$ 0,00</span>
                </div>
            </div>

            <div class="summary-row summary-total">
                <span>Total:</span>
                <span id="cart-total">R$ 0,00</span>
            </div>

            <button class="btn-checkout" onclick="finalizarCompra()">Finalizar Compra</button>
        </aside>
    </main>

    <script src="js/carrinho.js"></script>
</body>
</html>
